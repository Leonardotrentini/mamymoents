<div id="moment-photo-overlay" class="absolute inset-0 flex flex-col items-center justify-center p-8 text-center bg-gradient-to-t from-black/45 via-black/10 to-transparent pointer-events-none transition-opacity duration-300">
<div class="w-20 h-20 rounded-full bg-white/95 flex items-center justify-center mb-4 shadow-lg">

</div>
<p class="text-white font-semibold tracking-wide uppercase text-xs drop-shadow-sm">Toque para escolher ou tirar foto</p>
<p class="text-white/85 text-[11px] mt-2 max-w-[240px]">Galeria ou câmera — a imagem é otimizada para guardar com segurança.</p>
</div>
</label>
<div class="mt-3 flex justify-center gap-3">
<button type="button" id="moment-photo-clear" class="hidden text-sm font-semibold text-primary border-0 bg-transparent cursor-pointer hover:underline">Remover foto</button>
<button type="button" id="moment-photo-repick" class="hidden text-sm font-semibold text-on-surface-variant border-0 bg-transparent cursor-pointer hover:text-primary">Trocar foto</button>
</div>
<p id="moment-photo-status" class="text-center text-xs text-on-surface-variant mt-2 min-h-[1rem]" aria-live="polite"></p>
</section>
<!-- Section 2: Textarea for Feeling -->
<section class="mb-10">
<div class="bg-surface-container-low rounded-3xl p-8 transition-all hover:bg-surface-container">
<label class="block text-primary font-bold text-lg mb-4">O que você sentiu?</label>
<textarea id="moment-note" maxlength="1000" class="w-full bg-transparent border-0 focus:ring-0 text-xl font-headline leading-relaxed text-on-surface placeholder:text-on-surface-variant/40 min-h-[160px] p-0 resize-none" placeholder="Descreva as batidas do seu coração hoje..."></textarea>
<div class="flex justify-end mt-4">
<span id="moment-note-count" class="text-on-surface-variant/60 font-label text-xs tracking-widest">0 / 1000</span>
</div>
<div class="w-full h-[2px] bg-primary mt-2"></div>
</div>
</section>
<!-- Section 3: Input fields -->
<section class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
<!-- Location -->
<div class="bg-surface-container-lowest p-6 rounded-2xl shadow-[0_4px_16px_rgba(171,37,84,0.04)]">

<span class="material-symbols-outlined text-primary text-xl" data-icon="location_on">location_on</span>
<label class="text-on-surface-variant font-bold text-xs uppercase tracking-widest">Localização</label>
</div>
<input id="moment-place" class="w-full bg-transparent border-0 border-b-2 border-surface-container-high focus:border-primary focus:ring-0 p-0 py-2 text-on-surface font-medium" placeholder="Em casa" type="text"/>
</div>
<!-- People -->

                Salvar momento
            </button>

</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center pt-3 pb-8 px-4 bg-white/90 dark:bg-zinc-900/90 backdrop-blur-lg shadow-[0_-8px_32px_rgba(171,37,84,0.08)] rounded-t-[2.5rem] overflow-hidden">
<!-- Gallery -->
<a class="flex flex-col items-center justify-center text-zinc-400 dark:text-zinc-500 px-5 py-2 hover:text-[#cc406c] transition-colors tap-highlight-transparent no-underline" href="gallery.html">
<span class="material-symbols-outlined mb-1" data-icon="photo_library">photo_library</span>

</a>

</a>

<span class="material-symbols-outlined mb-1" data-icon="history_edu">history_edu</span>
<span class="text-[10px] uppercase tracking-widest font-['Plus_Jakarta_Sans'] font-medium">History</span>
</a>

<script src="js/mamy-progress.js"></script>
<script>
(function () {
  var DEFAULT_IMG =
    'https://lh3.googleusercontent.com/aida-public/AB6AXuA6M8ktBCQaZuRbTws4lSTFZ8HpUSTe-9njswOFjqs9x5ThQlwqRtTpJHhrUXcWl1IGg2ge3v5dGd6DblboTl5sEjYwe63jNG3zxW8d2hrvZFIemywnaKBrzZv-WOJ6k5YI8H99rkaT5PJaGH8KiKcXUg39gPYLmWpU-FwGlvRq2yjCrxhpCtasg7qwA_2Z5LxMT-TqXAj9X3Fg1AuhNafMMOuJ_nhDAWnuBwteMv8Bw-pyezFIyxUWLk4XRKdyCHohWSlCZYklW6zA';

  var momentPhotoDataUrl = null;
  var ta = document.getElementById('moment-note');
  var cnt = document.getElementById('moment-note-count');
  var btn = document.getElementById('moment-save');
  var hint = document.getElementById('moment-save-hint');
  var photoInput = document.getElementById('moment-photo-input');
  var photoImg = document.getElementById('moment-photo-img');
  var photoOverlay = document.getElementById('moment-photo-overlay');
  var photoClear = document.getElementById('moment-photo-clear');
  var photoRepick = document.getElementById('moment-photo-repick');
  var photoStatus = document.getElementById('moment-photo-status');

  function resizeImageFile(file, maxEdge, quality, cb) {
    var reader = new FileReader();
    reader.onload = function () {
      var dataUrl = reader.result;
      var img = new Image();
      img.onload = function () {
        var w = img.naturalWidth;
        var h = img.naturalHeight;
        if (!w || !h) {
          cb(null);
          return;
        }
        var scale = 1;
        if (w >= h && w > maxEdge) scale = maxEdge / w;
        else if (h > w && h > maxEdge) scale = maxEdge / h;
        var tw = Math.max(1, Math.round(w * scale));
        var th = Math.max(1, Math.round(h * scale));
        var canvas = document.createElement('canvas');
        canvas.width = tw;
        canvas.height = th;
        var ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, tw, th);
        var out;
        try {
          out = canvas.toDataURL('image/jpeg', quality);
        } catch (e) {
          out = dataUrl;
        }
        cb(out);
      };
      img.onerror = function () {
        cb(null);
      };
      img.src = dataUrl;
    };
    reader.onerror = function () {
      cb(null);
    };
    reader.readAsDataURL(file);
  }

  function setPhotoUI(hasCustom) {
    if (hasCustom) {
      photoOverlay.classList.add('opacity-0');
      photoClear.classList.remove('hidden');
      photoRepick.classList.remove('hidden');
    } else {
      photoOverlay.classList.remove('opacity-0');
      photoClear.classList.add('hidden');
      photoRepick.classList.add('hidden');
      photoImg.src = DEFAULT_IMG;
    }
  }

  function clearPhoto() {
    momentPhotoDataUrl = null;
    if (photoInput) photoInput.value = '';
    setPhotoUI(false);
    if (photoStatus) photoStatus.textContent = '';
  }

  if (photoInput && photoImg) {
    photoInput.addEventListener('change', function () {
      var f = photoInput.files && photoInput.files[0];
      if (!f) return;
      if (!/^image\//.test(f.type)) {
        if (photoStatus) photoStatus.textContent = 'Escolha um ficheiro de imagem (JPG, PNG, etc.).';
        return;
      }
      if (f.size > 25 * 1024 * 1024) {
        if (photoStatus) photoStatus.textContent = 'Ficheiro demasiado grande. Tente outra foto (máx. ~25 MB).';
        return;
      }
      if (photoStatus) photoStatus.textContent = 'A otimizar imagem…';
      resizeImageFile(f, 1280, 0.82, function (dataUrl) {
        if (!dataUrl) {
          if (photoStatus) photoStatus.textContent = 'Não foi possível ler esta imagem.';
          return;
        }
        momentPhotoDataUrl = dataUrl;
        photoImg.src = dataUrl;
        setPhotoUI(true);
        if (photoStatus) {
          photoStatus.textContent = 'Foto pronta. Pode guardar só com a foto ou completar o texto abaixo.';
        }
      });
    });
  }

  if (photoClear) {
    photoClear.addEventListener('click', function (e) {
      e.preventDefault();
      e.stopPropagation();
      clearPhoto();
    });
  }
  if (photoRepick) {
    photoRepick.addEventListener('click', function (e) {
      e.preventDefault();
      e.stopPropagation();
      if (photoInput) photoInput.click();
    });
  }

  if (ta && cnt) {
    function upd() {
      cnt.textContent = ta.value.length + ' / 1000';
    }
    ta.addEventListener('input', upd);
    upd();
  }
  if (!btn || !window.MamyProgress) return;
  btn.addEventListener('click', function () {
    var note = (document.getElementById('moment-note') && document.getElementById('moment-note').value.trim()) || '';
    var place = (document.getElementById('moment-place') && document.getElementById('moment-place').value.trim()) || '';
    var people = (document.getElementById('moment-people') && document.getElementById('moment-people').value.trim()) || '';
    if (!note && !place && !people && !momentPhotoDataUrl) {
      if (hint) {
        hint.textContent = 'Adicione uma foto ou escreva algo (sentimento, local ou pessoas) para guardar.';
        hint.classList.remove('opacity-60');
        hint.classList.add('text-error', 'font-medium');
      }
      return;
    }
    if (hint) {
      hint.classList.add('opacity-60');
      hint.classList.remove('text-error', 'font-medium');
      hint.textContent = 'Este momento entra na galeria e soma pontos no Crescimento.';
    }
    var preview =
      note ||
      (place ? 'Em ' + place : '') + (people ? (place ? ' · ' : '') + people : '') ||
      (momentPhotoDataUrl ? 'Momento com foto' : 'Momento registado');
    if (preview.length > 80) preview = preview.slice(0, 77) + '…';
    var dk = MamyProgress.todayKey();
    var payload = {
      date: dk,
      note: note,
      place: place,
      people: people,
      preview: preview,
      createdAt: new Date().toISOString(),
    };
    if (momentPhotoDataUrl) payload.photoDataUrl = momentPhotoDataUrl;

    var saved = MamyProgress.appendMoment(payload);
    if (!saved) {
      if (hint) {
        hint.textContent =
          'Não coube na memória do navegador. Remova a foto ou use uma mais simples, ou apague momentos antigos.';
        hint.classList.remove('opacity-60');
        hint.classList.add('text-error', 'font-medium');
      }
      return;
    }
    window.location.href = 'gallery.html';
  });
})();
</script>
